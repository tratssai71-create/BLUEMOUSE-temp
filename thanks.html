<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FFFEFB" />
  <title>送信完了 | BLUE MOUSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Zen Maru Gothic", sans-serif; background: #FFFEFB; color: #33251a; line-height: 1.75; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }
    :root { --coral:#f2906c; --teal-light:#e8f6f7; --coral-light:#fdf0eb; --ink:#33251a; }

    .header { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:center; padding:0 32px; height:60px; background: transparent; backdrop-filter:blur(12px); border-bottom:1px solid rgba(0,0,0,.05); }
    .header__logo img { height:32px; width:auto; }

    .thanks { flex:1; display:flex; align-items:center; justify-content:center; padding:80px 32px; }
    .thanks__card { max-width:520px; text-align:center; background:linear-gradient(135deg, var(--teal-light) 0%, var(--coral-light) 100%); border-radius:28px; padding:56px 40px; }
    .thanks__title { font-size:clamp(1.4rem,3vw,1.8rem); font-weight:700; color:var(--ink); margin-bottom:12px; }
    .thanks__body { font-size:14px; color:#6b5a4c; line-height:1.9; margin-bottom:28px; }
    .thanks__btn { display:inline-flex; align-items:center; gap:6px; padding:12px 32px; background:var(--coral); color:#fff; font-size:14px; font-weight:600; border-radius:100px; transition:transform .2s, box-shadow .2s; }
    .thanks__btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(242,144,108,.3); }

    .pg-footer { text-align:center; padding:24px 16px; font-size:11px; color:#bbb; border-top:1px solid rgba(0,0,0,.05); }

    @media (max-width:780px) {
      .thanks { padding:80px 16px; }
      .thanks__card { padding:40px 24px; border-radius:20px; }
    }
  </style>
</head>
<body>

<header class="header">
  <a href="./index.html" class="header__logo"><img src="./logo.png" alt="BLUE MOUSE" /></a>
</header>

<div class="thanks">
  <div class="thanks__card">
    <h1 class="thanks__title">お問い合わせ<br>ありがとうございます。</h1>
    <p class="thanks__body">内容を確認のうえ、担当者よりご連絡いたします。<br>通常2〜3営業日以内にご返信いたしますので、<br>しばらくお待ちください。</p>
    <a href="./index.html" class="thanks__btn">トップに戻る ›</a>
  </div>
</div>

<div class="pg-footer">© BLUE MOUSE All Rights Reserved.</div>

<style>
  @keyframes ctaPulse {
    0%   { transform: scale(.92); opacity: .55; }
    100% { transform: scale(1.28); opacity: 0; }
  }
  .floating-cta {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 150;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(155deg, var(--coral), #e8785a);
    color: #fff;
    font-family: "Zen Maru Gothic", "Zen Kaku Gothic New", sans-serif;
    text-align: center;
    text-decoration: none;
    box-shadow: 0 10px 26px rgba(242,144,108,.45);
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
  }
  .floating-cta::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid var(--coral);
    animation: ctaPulse 2.4s ease-out infinite;
    pointer-events: none;
  }
  .floating-cta__icon {
    width: 16px; height: 16px;
    margin-top: 3px;
  }
  .floating-cta__main { font-size: 14px; font-weight: 700; letter-spacing: .03em; line-height: 1.15; }
  .floating-cta__sub { font-size: 11px; font-weight: 600; letter-spacing: .01em; opacity: .95; line-height: 1.2; }
  .floating-cta:hover { transform: translateY(-4px) scale(1.06); box-shadow: 0 14px 34px rgba(242,144,108,.55); }
  @media (max-width: 780px) {
    .floating-cta { bottom: 16px; right: 16px; width: 78px; height: 78px; }
    .floating-cta__icon { width: 13px; height: 13px; }
    .floating-cta__main { font-size: 12px; }
    .floating-cta__sub { font-size: 9.5px; }
  }
</style>
<a href="./contact.html" class="floating-cta">
  <span class="floating-cta__main">体験</span>
  <span class="floating-cta__sub">お問い合わせ</span>
  <svg class="floating-cta__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</a>
</body>
</html>
